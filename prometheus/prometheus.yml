# ============================================================
# prometheus/prometheus.yml — VM4
# Scrapes all 4 VMs: Node Exporter + DCGM GPU Exporter
# ============================================================

global:
  scrape_interval: 5s           # How often to scrape targets
  evaluation_interval: 15s      # How often to evaluate alert rules
  scrape_timeout: 4s
  external_labels:
    cluster: "prod-infra"
    environment: "production"

# ─── Alertmanager integration ────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
      timeout: 10s

# ─── Alert rule files ────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/cpu_memory.yml"
  - "/etc/prometheus/rules/disk.yml"
  - "/etc/prometheus/rules/gpu.yml"
  - "/etc/prometheus/rules/instance.yml"

# ─── Scrape configs ──────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "vm4-prometheus"

  # ── Node Exporter: CPU / RAM / Disk / Network ──────────────
  - job_name: "node_exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["172.22.8.114:9100"]
        labels:
          instance: "vm1"
          role: "gpu-server"
      - targets: ["172.22.8.107:9100"]
        labels:
          instance: "kagoj.ai"
          role: "ml-workload"
      # - targets: ["10.0.0.3:9100"]   # ← Replace with real VM3 IP
      #   labels:
      #     instance: "vm3"
      #     role: "db-server"
      - targets: ["node-exporter:9100"]
        labels:
          instance: "vm4"
          role: "monitoring-server"

  # ── DCGM Exporter: GPU utilization / VRAM / Temp / Power ──
  - job_name: "dcgm_exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["172.22.8.114:9400"]
        labels:
          instance: "vm1"
          role: "app-server"
      # vm2 (common-portal) has no GPU — no DCGM exporter
      - targets: ["10.0.0.3:9400"]   # ← Replace with real VM3 IP
        labels:
          instance: "vm3"
          role: "db-server"
      - targets: ["dcgm-exporter:9400"]
        labels:
          instance: "vm4"
          role: "monitoring-server"
    # Skip targets that have no GPU (DCGM returns empty if no GPU present)
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "DCGM_.*"
        action: keep
